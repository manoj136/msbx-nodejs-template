apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: nodejs-express-service
  title: Node.js Express Service
  description: Create a standard Node.js Express microservice

spec:
  owner: msbx-team
  type: service

  parameters:
    - title: Service Information
      required:
        - name
        - owner
      properties:
        name:
          title: Service Name
          type: string
        description:
          title: Description
          type: string
        owner:
          title: Owner
          type: string

  steps:
    - id: fetch-base
      name: Fetch Template
      action: fetch:template
      input:
        url: https://github.com/manoj136/msbx-nodejs-template
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}

    - id: publish
      name: Publish repository
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: Node.js service ${{ parameters.name }}

    - id: register
      name: Register in Backstage
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'
