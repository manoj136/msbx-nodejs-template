apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: nodejs-service
  title: Node.js Microservice
  description: Create a standard Node.js service with Express
  tags:
    - nodejs
    - express
    - backend
spec:
  owner: msbx-team
  type: service

  parameters:
    - title: Basic Information
      required:
        - componentName
      properties:
        componentName:
          title: Service name
          type: string
          pattern: '^[a-z0-9-]+$'
          description: Unique name of the service

    - title: Repository Configuration
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository URL
          type: string
          description: Git repository URL
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
  steps:
    # Debug Parameters
    - id: debug
      name: Debug Parameters
      action: debug:log
      input:
        message: |
          Name: ${{ parameters.name }}
          Description: ${{ parameters.description }}
          Owner: ${{ parameters.owner }}
          Repo URL: ${{ parameters.repoUrl }}
          repoContentsUrl = ${{ steps.publish.output.repoContentsUrl }}

    - id: fetch-base
      name: Fetch Template
      action: fetch:template
      input:
        url: https://github.com/manoj136/msbx-nodejs-template
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}

    - id: publish
      name: Publish repository
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl | replace("&amp;", "&") }}
        description: Node.js service ${{ parameters.name }}

    - id: register
      name: Register in Backstage
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        icon: github
        url: ${{ steps.publish.output.remoteUrl }}

      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}

      - title: Repository Contents
        url: ${{ steps.publish.output.repoContentsUrl }}

    text:
      - title: Next Steps
        content: |
          Your Node.js Express service has been created successfully.

          Recommended next steps:
          - Clone the repository
          - Run npm install
          - Run npm run dev
          - Configure CI/CD
          - Deploy to Kubernetes
          - Add TechDocs
