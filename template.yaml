apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: nodejs-service
  title: Node.js Microservice
  description: Create a standard Node.js service with Express
  tags:
    - nodejs
    - express
    - backend

spec:
  owner: msbx-team
  type: service

  parameters:
    - title: Service Information
      required:
        - name
        - owner
        - repoUrl

      properties:
        name:
          title: Service Name
          type: string
          description: Unique name of the service
          pattern: '^[a-z0-9-]+$'

        description:
          title: Description
          type: string
          description: Service description

        owner:
          title: Owner
          type: string
          description: Team or user owning the service
          default: guests

        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: debug
      name: Debug Parameters
      action: debug:log
      input:
        message: |
          Name: ${{ parameters.name }}
          Description: ${{ parameters.description }}
          Owner: ${{ parameters.owner }}
          Repo URL: ${{ parameters.repoUrl }}

    - id: fetch-base
      name: Fetch Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}

    - id: publish
      name: Publish Repository
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: Node.js service ${{ parameters.name }}
        defaultBranch: main

    - id: debug-publish
      name: Debug Publish Outputs
      action: debug:log
      input:
        message: |
          remoteUrl=${{ steps.publish.output.remoteUrl }}
          repoContentsUrl=${{ steps.publish.output.repoContentsUrl }}
          commitHash=${{ steps.publish.output.commitHash }}

    - id: register
      name: Register in Backstage
      action: catalog:register
      input:      
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}/main
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        icon: github
        url: ${{ steps.publish.output.remoteUrl }}

      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}

    text:
      - title: Next Steps
        content: |
          Your Node.js Express service has been created successfully.

          Recommended next steps:
          - Clone the repository
          - Run npm install
          - Run npm run dev
          - Configure CI/CD
          - Deploy to Kubernetes
          - Add TechDocs